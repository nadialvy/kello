name: kello
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  lucide_icons_flutter: ^3.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-200.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-300.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-400.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-500.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-600.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-700.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-800.ttf
          weight: 800


